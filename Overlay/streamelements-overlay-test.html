<!DOCTYPE html>
<!--
  LOTRO Death Overlay – TEST MODE
  Verhält sich identisch zur Produktions-Overlay, liest/schreibt aber aus
  wp_lotro_deaths_test und wp_lotro_characters_test.
  Der Streamer-Filter nutzt die produktive /streamers API (kein Test-Äquivalent).

  Nutzung:
    1. Client im Test-Modus starten:
       $env:SERVER_URL="https://www.dodaswelt.de/wp-json/lotro-deaths/v1/test/death"; node client.js
    2. Diese Datei im Browser öffnen (Doppelklick) oder als Browser-Source in OBS.
    3. Im Spiel sterben → Overlay zeigt Test-Event.
    4. Nach Testende Test-Daten löschen:
       DELETE https://www.dodaswelt.de/wp-json/lotro-deaths/v1/test/clear  (Admin-Auth)

  API-Endpunkte (Test-Tabellen):
    GET  /test/death/current
    POST /test/death/next
    GET  /test/health
    GET  /streamers  (produktive API – Streamer-Filter gilt auch im Test)
-->
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTRO Death Overlay – TEST MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.15); /* leicht sichtbar für lokales Testen */
            font-family: 'Cinzel', serif;
        }

        /* TEST-MODE-Badge oben links */
        .test-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 60, 0, 0.85);
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            border: 2px solid #ff3c00;
            z-index: 9999;
            letter-spacing: 2px;
        }

        /* Status-Zeile unten links */
        .test-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            z-index: 9999;
        }

        /* ============================================
           MINIMALIST OVERLAY - NO BACKGROUND
           ============================================ */

        .death-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            text-align: center;
        }

        .death-overlay.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* Logo */
        .logo {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            animation: logoGlow 2s ease-in-out infinite;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
        }

        @keyframes logoGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
            }
            50% {
                filter: drop-shadow(0 0 35px rgba(212, 175, 55, 1));
            }
        }

        /* Title - GEFALLEN */
        .title {
            font-size: 4em;
            font-weight: 900;
            color: #d4af37;
            text-shadow:
                0 0 30px rgba(212, 175, 55, 0.9),
                0 0 60px rgba(212, 175, 55, 0.5),
                3px 3px 8px rgba(0, 0, 0, 0.9);
            margin-bottom: 25px;
            letter-spacing: 8px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% {
                text-shadow:
                    0 0 30px rgba(212, 175, 55, 0.9),
                    0 0 60px rgba(212, 175, 55, 0.5),
                    3px 3px 8px rgba(0, 0, 0, 0.9);
            }
            50% {
                text-shadow:
                    0 0 40px rgba(212, 175, 55, 1),
                    0 0 80px rgba(212, 175, 55, 0.7),
                    3px 3px 8px rgba(0, 0, 0, 0.9);
            }
        }

        /* Character Name */
        .character-name {
            font-size: 2.5em;
            font-weight: 700;
            color: #f5e6d3;
            text-shadow:
                0 0 20px rgba(245, 230, 211, 0.6),
                3px 3px 6px rgba(0, 0, 0, 0.9);
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        /* Character Level */
        .character-level {
            font-size: 1.8em;
            color: #d4af37;
            font-weight: 600;
            text-shadow:
                0 0 15px rgba(212, 175, 55, 0.6),
                2px 2px 4px rgba(0, 0, 0, 0.9);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        /* Death Count */
        .death-count {
            font-size: 1.2em;
            color: #c0a080;
            font-weight: 400;
            text-shadow:
                2px 2px 4px rgba(0, 0, 0, 0.9);
            letter-spacing: 2px;
        }

        /* Entrance animation */
        @keyframes fadeInScale {
            from {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* Exit animation */
        @keyframes fadeOutScale {
            from {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            to {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Sichtbare Test-Kennzeichnung -->
    <div class="test-badge">⚠ TEST MODE</div>
    <div class="test-status" id="testStatus">Initialisiere...</div>

    <div class="death-overlay" id="deathOverlay">
        <!-- Logo -->
        <div class="logo">
            <img src="" id="logoImage" alt="Logo">
        </div>

        <!-- Title -->
        <div class="title">GEFALLEN</div>

        <!-- Character Info -->
        <div class="character-name" id="characterName">...</div>
        <div class="character-level" id="characterLevel">Level ...</div>
        <div class="death-count" id="deathCount">... Mal gestorben</div>
    </div>

    <!-- Audio element – src is set dynamically before each play -->
    <audio id="deathSound" preload="none"></audio>

    <script>
        // ============================================
        // CONFIGURATION - CUSTOMIZE HERE
        // ============================================

        const CONFIG = {
            // API URL - Your WordPress site
            API_URL: 'https://www.dodaswelt.de/wp-json/lotro-deaths/v1',

            // How often to check for new deaths (milliseconds)
            CHECK_INTERVAL: 3000, // 3 seconds

            // How long to display each death (milliseconds)
            DISPLAY_DURATION: 10000, // 10 seconds

            // Logo URL
            LOGO_URL: 'https://herrin-inge.de/logo.png',

            // ============================================
            // SOUND CONFIGURATION
            // ============================================

            // Normal death sound (played for every death that is NOT a milestone)
            SOUND_URL: 'https://www.dodaswelt.de/lotro/Trauerlied_1.mp3',

            // Milestone sounds – one is chosen at random when deathCount % 5 === 0
            // (5th, 10th, 15th death, etc.)
            ALERT_SOUND_URLS: [
                'https://www.dodaswelt.de/lotro/Alert_1.mp3',
                'https://www.dodaswelt.de/lotro/Alert_2.mp3',
            ],

            // Volume (0.0 – 1.0)
            SOUND_VOLUME: 0.7,
        };

        // ============================================
        // TEST-OVERLAY: Test-API-Endpunkte
        // Death-Events kommen aus den _test-Tabellen.
        // Streamer-Filter nutzt produktive /streamers API.
        // ============================================

        const TEST_BASE = CONFIG.API_URL + '/test';

        // ============================================
        // OVERLAY LOGIC - DO NOT EDIT BELOW
        // ============================================

        let currentDeath = null;
        let isDisplaying = false;
        let isChecking = false;
        let pollCount = 0;

        // ============================================
        // STATE MANAGEMENT
        // ============================================

        function setStatus(msg) {
            document.getElementById('testStatus').textContent = msg;
        }

        /**
         * Erzwingt einen vollständigen State-Reset.
         * Wird von Watchdog, visibilitychange und globalen Error-Handlern aufgerufen.
         */
        function resetState() {
            isDisplaying = false;
            isChecking = false;
            currentDeath = null;
            const overlay = document.getElementById('deathOverlay');
            if (overlay) overlay.classList.remove('show');
        }

        // Set of character names that are in the streamer mapping table.
        // Deaths from characters NOT in this set are silently skipped.
        // Empty set = mapping not yet loaded = no filter applied (fail-open).
        let mappedCharacters = new Set();

        // Fetch mapped character names from /streamers and cache them locally.
        // Called once on init and then every 5 minutes so new mappings are picked up.
        async function refreshMappedCharacters() {
            try {
                const response = await fetch(`${CONFIG.API_URL}/streamers`);
                const data = await response.json();
                if (data.success && Array.isArray(data.streamers)) {
                    mappedCharacters = new Set(data.streamers.map(s => s.characterName));
                    console.log('[FILTER] Gemappte Charaktere:', [...mappedCharacters]);
                }
            } catch (error) {
                console.warn('[FILTER] Streamer-Liste konnte nicht geladen werden:', error);
            }
        }

        // Initialize logo
        function initializeLogo() {
            const logoImage = document.getElementById('logoImage');
            if (CONFIG.LOGO_URL && CONFIG.LOGO_URL.trim() !== '') {
                logoImage.src = CONFIG.LOGO_URL;
                console.log('[LOGO] Logo loaded:', CONFIG.LOGO_URL);
            } else {
                console.warn('[LOGO] No logo URL configured');
            }
        }

        /**
         * Play the appropriate sound for a death.
         * – Milestone deaths (5th, 10th, 15th, …): random Alert_1 or Alert_2
         * – All other deaths: normal SOUND_URL (Trauerlied)
         */
        function playDeathSound(deathCount) {
            const audio = document.getElementById('deathSound');
            let soundUrl;

            if (deathCount && deathCount % 5 === 0 && CONFIG.ALERT_SOUND_URLS.length > 0) {
                // Milestone: pick one of the alert sounds at random
                const idx = Math.floor(Math.random() * CONFIG.ALERT_SOUND_URLS.length);
                soundUrl = CONFIG.ALERT_SOUND_URLS[idx];
                console.log(`[SOUND] Milestone death #${deathCount}! Playing alert: ${soundUrl}`);
            } else {
                soundUrl = CONFIG.SOUND_URL;
                console.log(`[SOUND] Death #${deathCount} – playing: ${soundUrl}`);
            }

            if (!soundUrl) return;

            audio.src = soundUrl;
            audio.volume = Math.max(0, Math.min(1, CONFIG.SOUND_VOLUME));
            audio.currentTime = 0;
            audio.play().catch(error => {
                console.error('[SOUND] Failed to play sound:', error);
            });
        }

        // Display death overlay
        function displayDeath(death) {
            if (isDisplaying) return;

            isDisplaying = true;

            // Update content
            document.getElementById('characterName').textContent = death.characterName;
            document.getElementById('characterLevel').textContent = `Level ${death.level}`;
            document.getElementById('deathCount').textContent = `${death.deathCount} Mal gestorben`;

            // Show overlay
            const overlay = document.getElementById('deathOverlay');
            overlay.classList.add('show');

            // Play sound – pass deathCount so milestone logic can decide which file
            playDeathSound(death.deathCount);

            setStatus(`[TEST] Zeige: ${death.characterName} – Tod #${death.deathCount} (ID ${death.id})`);
            console.log(`[DISPLAY] Showing death #${death.deathCount} for ${death.characterName} (Level ${death.level})`);

            // Safety-Watchdog: Falls der normale setTimeout durch Tab-Suspend oder andere
            // Browser-Einschränkungen nicht feuert, erzwingen wir nach DISPLAY_DURATION + 3s
            // einen State-Reset, damit das Overlay nicht permanent hängen bleibt.
            const safetyTimeout = setTimeout(() => {
                if (isDisplaying) {
                    console.warn('[WATCHDOG] Safety-Timer ausgelöst – isDisplaying hängt. State-Reset wird erzwungen.');
                    resetState();
                }
            }, CONFIG.DISPLAY_DURATION + 3000);

            // Hide after duration, then advance the queue
            setTimeout(() => {
                overlay.classList.remove('show');

                setTimeout(() => {
                    clearTimeout(safetyTimeout); // Normaler Ablauf – Safety-Watchdog abbrechen
                    isDisplaying = false;
                    advanceQueue(death.id);
                }, 600); // Wait for fade-out animation
            }, CONFIG.DISPLAY_DURATION);
        }

        // Fetch current (oldest unprocessed) death from TEST API
        async function fetchCurrentDeath() {
            try {
                const response = await fetch(`${TEST_BASE}/death/current`);
                const data = await response.json();

                if (data.success && data.data) {
                    return data.data;
                }
                return null;
            } catch (error) {
                console.error('[ERROR] Failed to fetch death:', error);
                return null;
            }
        }

        /**
         * Mark the displayed death as processed and fetch the next one.
         * Uses TEST API. Streamer-Filter (produktive /streamers) gilt auch hier.
         */
        async function advanceQueue(deathId) {
            try {
                const response = await fetch(`${TEST_BASE}/death/next`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: deathId }),
                });

                const data = await response.json();
                console.log('[API] Queue advanced:', data);

                if (data.success && data.data && data.data.id) {
                    const next = data.data;

                    // Apply mapping filter to the next queued death as well
                    if (mappedCharacters.size > 0 && !mappedCharacters.has(next.characterName)) {
                        console.log(`[FILTER] "${next.characterName}" nicht im Streamer-Mapping – wird uebersprungen`);
                        currentDeath = null;
                        setTimeout(checkForDeaths, 500);
                    } else {
                        currentDeath = next;
                        setTimeout(() => { displayDeath(next); }, 2000);
                    }
                }
            } catch (error) {
                console.error('[ERROR] Failed to advance queue:', error);
            }
        }

        // Mark a death as processed without displaying it, then reset state so
        // the polling loop will pick up the next queued entry on the next tick.
        async function skipDeath(deathId) {
            try {
                await fetch(`${TEST_BASE}/death/next`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: deathId }),
                });
                currentDeath = null;
            } catch (error) {
                console.error('[ERROR] Failed to skip death:', error);
            }
        }

        // Main polling loop – only runs when nothing is currently on screen
        async function checkForDeaths() {
            if (isDisplaying) return;
            if (isChecking) return;
            isChecking = true;
            try {
                pollCount++;
                if (pollCount % 10 === 0) {
                    setStatus(`[TEST] Warte auf Events... (Poll #${pollCount})`);
                }

                const death = await fetchCurrentDeath();
                if (!death) return;

                // Streamer-Filter gilt auch im Test (produktive /streamers API)
                if (mappedCharacters.size > 0 && !mappedCharacters.has(death.characterName)) {
                    console.log(`[FILTER] "${death.characterName}" nicht im Streamer-Mapping – wird uebersprungen`);
                    await skipDeath(death.id);
                    setTimeout(checkForDeaths, 500); // sofort nächsten prüfen
                    return;
                }

                if (!currentDeath || currentDeath.id !== death.id) {
                    currentDeath = death;
                    displayDeath(death);
                }
            } finally {
                isChecking = false;
            }
        }

        async function checkTestHealth() {
            try {
                const response = await fetch(`${TEST_BASE}/health`);
                const data = await response.json();
                if (data.success) {
                    setStatus(`[TEST] API erreichbar. Queue: ${data.queueLength ?? 0}, Deaths: ${data.totalDeaths ?? 0}`);
                    console.log('[TEST] Health:', data);
                } else {
                    setStatus('[TEST] API: unerwartete Antwort');
                }
            } catch (error) {
                setStatus('[TEST] API nicht erreichbar – dodaswelt.de online?');
                console.error('[TEST] Health-Check fehlgeschlagen:', error);
            }
        }

        // Initialize
        async function init() {
            console.log('[INIT] LOTRO Death Overlay (TEST MODE) starting...');
            console.log('[TEST] Death-Events: Test-Tabellen (/test/)');
            console.log('[TEST] Streamer-Filter: produktive /streamers API');
            console.log('[CONFIG] Check interval:', CONFIG.CHECK_INTERVAL + 'ms');
            console.log('[CONFIG] Display duration:', CONFIG.DISPLAY_DURATION + 'ms');
            console.log('[CONFIG] Normal sound:', CONFIG.SOUND_URL || 'Not configured');
            console.log('[CONFIG] Alert sounds:', CONFIG.ALERT_SOUND_URLS);

            initializeLogo();

            await checkTestHealth();

            // Load mapped characters, then start polling
            await refreshMappedCharacters();
            setInterval(refreshMappedCharacters, 5 * 60 * 1000); // refresh every 5 minutes

            // Start polling
            setInterval(checkForDeaths, CONFIG.CHECK_INTERVAL);
            checkForDeaths(); // Check immediately on load
        }

        // ============================================
        // RESILIENCE: VISIBILITY + GLOBAL ERROR HANDLING
        // ============================================

        // OBS und StreamElements können Browser-Tabs suspendieren (z.B. wenn die
        // Browser-Quelle nicht sichtbar ist). Beim Wechsel zurück auf 'visible' kann
        // State inkonsistent sein – daher vollständiger Reset + sofortiger Neucheck.
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                console.log('[VISIBILITY] Tab wieder sichtbar – State wird zurückgesetzt und Polling neu gestartet.');
                resetState();
                checkForDeaths();
            }
        });

        // Globaler Fallback: Bei unbehandelten JS-Fehlern oder Promise-Ablehnungen State
        // zurücksetzen, damit das Overlay nicht dauerhaft blockiert wird.
        window.addEventListener('error', (event) => {
            console.error('[ERROR] Unbehandelter Fehler – State-Reset:', event.message, event.error);
            resetState();
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('[ERROR] Unbehandelte Promise-Ablehnung – State-Reset:', event.reason);
            resetState();
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
